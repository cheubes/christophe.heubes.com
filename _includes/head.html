<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="{{ page.description }}">
  <meta name="author" content="Christophe Heubès">
  <meta name="theme-color" content="#2C374C">

  <title>{{ page.title }}</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">

  {% assign pages=site.pages | where:"ref", page.ref | sort: 'lang' %}
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}/" />
  {% for page in pages %}
  <link rel="alternate" hreflang="{{ page.lang }}" href="{{ site.url }}{{ page.url }}" />
  {% endfor %}

  <!-- Open Graph -->
  <meta property="og:type" content="profile">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:image" content="{{ site.url }}/assets/img/photo.jpg">
  <meta property="og:locale" content="{% if page.lang == 'en' %}en_GB{% else %}fr_FR{% endif %}">
  <meta property="profile:first_name" content="Christophe">
  <meta property="profile:last_name" content="Heubès">

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Christophe Heubès",
    "jobTitle": "{% if page.lang == 'en' %}Aligning Vision, Execution & People{% else %}Aligner Vision, Exécution & Humain{% endif %}",
    "url": "{{ site.url }}/",
    "image": "{{ site.url }}/assets/img/photo.jpg",
    "sameAs": [
      "https://www.linkedin.com/in/heubes/",
      "https://github.com/cheubes/"
    ]
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link href="/assets/dist/css/bootstrap-grid.min.css" rel="stylesheet">
  <link href="/assets/dist/css/bootstrap-utilities.min.css" rel="stylesheet">
  <link href="/assets/dist/css/hbs.css" rel="stylesheet">

</head>
